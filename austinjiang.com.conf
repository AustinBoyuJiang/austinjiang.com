# HTTP to HTTPS redirection
server {
    listen 80;
    server_name austinjiang.com www.austinjiang.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main server block for HTTPS
server {
    listen 443 ssl;
    server_name austinjiang.com www.austinjiang.com;

    ssl_certificate /etc/letsencrypt/live/austinjiang.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/austinjiang.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/austinjiang.com;
    index index.html index.htm index.php;

    location / {
        try_files $uri $uri/ =404;
    }

    # PHP scripts handling
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php-fpm/www.sock;  # 如果使用 TCP 端口，替换为 fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}

# Default server block for HTTP
server {
    listen 80;
    server_name _;
    root /var/www/default;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }
}

# Default server block for HTTPS
server {
    listen 443 ssl;
    server_name _;
    ssl_certificate /etc/letsencrypt/live/austinjiang.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/austinjiang.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/default;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }
}
