<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f1f3f4;
        }

        .container {
            background-color: white;
            margin: 20px auto;
            padding: 0;
            max-width: 600px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 1px solid #dcdcdc;
            overflow: hidden;
        }

        .header {
            background-color: #4285f4;
            color: white;
            padding: 20px;
            text-align: center;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }

            .header h2 {
                margin: 0;
                font-size: 24px;
            }

            .header p {
                margin: 5px 0 0;
                font-size: 16px;
                color: white;
                text-decoration: none;
            }

        .content {
            padding: 20px;
        }

            .content p {
                margin: 0 0 10px;
                font-size: 16px;
            }

                .content p strong {
                    font-weight: 600;
                }

        .footer {
            text-align: center;
            padding: 10px;
            color: #5f6368;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>You Have a New Message from Your Website!</h2>
            <p>austinjiang.com</p>
        </div>
        <div class="content">
            <p><strong>Name:</strong> {{name}}</p>
            <p><strong>Email:</strong> {{email}}</p>
            <p><strong>Subject:</strong> {{subject}}</p>
            <p><strong>Message:</strong></p>
            <p>{{message}}</p>
        </div>
        <div class="footer">
            <p>© 2024 Austin Jiang. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
