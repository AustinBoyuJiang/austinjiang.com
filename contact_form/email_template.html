<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f1f3f4;
        }

        .header {
            background-color: #4285f4;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .content {
            background-color: white;
            margin: 20px auto;
            padding: 20px;
            max-width: 600px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

            .content p {
                margin: 0 0 10px;
                font-size: 16px;
            }

                .content p strong {
                    font-weight: 600;
                }

        .footer {
            text-align: center;
            padding: 10px;
            color: #5f6368;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>New Message from Your Website</h2>
    </div>
    <div class="content">
        <p><strong>Name:</strong> {{name}}</p>
        <p><strong>Email:</strong> {{email}}</p>
        <p><strong>Subject:</strong> {{subject}}</p>
        <p><strong>Message:</strong></p>
        <p>{{message}}</p>
    </div>
    <div class="footer">
        <p>© 2024 Austin Jiang. All rights reserved.</p>
    </div>
</body>
</html>
